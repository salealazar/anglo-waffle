# Snippet para servir el laboratorio bajo /datos en el MISMO host de faro.
# Calcado de nginx/faro.conf. Va dentro del server { } del VIRTUAL_HOST de faro
# (junto al "location /faro"). El "upstream sqli-lab" vive en sqli-lab.upstream.
#
# proxy_pass SIN barra/URI final => nginx NO recorta el prefijo: el contenedor
# recibe "/datos/..." y el app lo maneja gracias a BASE_PATH=/datos.
# (El path es configurable: cambia "/datos" aquí y LAB_BASE_PATH en .env juntos.)

location /datos {
    # Si tu nginx no monta /logs, borra esta línea.
    error_log /logs/sqli-lab-error.log;

    proxy_pass http://sqli-lab;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
